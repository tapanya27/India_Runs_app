# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for code review, refactoring, and wiring the
  cross-encoder reranking + hybrid scoring pipeline. No candidate data was
  sent to any hosted LLM during ranking; the ranking step runs fully offline
  on CPU using local sentence-transformer and cross-encoder models.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage retrieve-and-rerank ranker over a prebuilt FAISS index of all
  100k candidates (all-MiniLM-L6-v2 embeddings of a signal-dense candidate
  text). For a JD we retrieve the top 700 by dense similarity, rerank that
  pool with a cross-encoder, then score each with six weighted components —
  semantic (35%), JD-aware skill match (30%), experience fit (15%), project
  relevance (10%), education (3%), and 23 Redrob behavioural signals (7%).
  Multiplicative modifiers penalise honeypots (impossible profiles), keyword
  stuffers, and consulting-only careers, and add a small India-location boost.
  Output is the top 100 with monotonic scores and specific, non-templated
  reasoning. Runs CPU-only within the 5-minute ranking budget.

